<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | HabitMentor</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container dashboard-container">
        <header class="dash-header">
            <div>
                <p class="date-text">Gamification</p>
                <h1>Trophy Room</h1>
            </div>
            <a href="settings.html" class="avatar-circle">
                <span id="userInitial">?</span>
            </a>
        </header>

        <div class="hero-card" style="margin-bottom: 24px;">
            <div class="hero-info" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>Total Mastery</h2>
                    <p id="totalTasksText" style="color: var(--text-secondary); margin-top: 4px;">0 Tasks Completed</p>
                </div>
                <div class="progress-circle" style="width: 60px; height: 60px; font-size: 16px;">
                    <span id="unlockedCount">0/0</span>
                </div>
            </div>
        </div>

        <div id="badgeGrid" class="badge-grid" style="margin-bottom: 80px;">
            <p class="empty-state">Loading your trophies...</p>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠</a>
            <a href="goals.html" class="nav-item">🎯</a>
            <a href="dashboard.html" class="fab-button">+</a>
            <a href="chat.html" class="nav-item">💬</a>
            <a href="achievements.html" class="nav-item active">🏆</a>
        </nav>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/achievements.js"></script>
</body>
</html>
